<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Gemini!</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f3f5f7; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 500px; width: 100%; border-top: 5px solid #E40000; }
        h1 { margin-top: 0; color: #323232; font-size: 24px;}
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box;}
        button { background: #E40000; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%;}
        button:hover { background: #cc0000; }
        button:disabled { background: #ff9999; cursor: wait; }
        #response-box { margin-top: 20px; padding: 15px; background: #fafafa; border: 1px solid #eee; border-radius: 8px; min-height: 80px; display: none; line-height: 1.5; color: #333;}
        .error { color: red; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello Gemini! 👋</h1>
        <p>A simple "Hello World" API test avoiding all the complex React dashboard routing.</p>
        
        <input type="text" id="question" placeholder="Ask a simple test question..." value="Say hello in 3 different languages!" />
        <button id="ask-btn" onclick="askGemini()">Ask Gemini</button>

        <div id="response-box"></div>
    </div>

    <script>
        async function askGemini() {
            const btn = document.getElementById('ask-btn');
            const responseBox = document.getElementById('response-box');
            const question = document.getElementById('question').value;

            if (!question.trim()) return;

            // Loading state
            btn.disabled = true;
            btn.textContent = 'Asking Gemini...';
            responseBox.style.display = 'block';
            responseBox.innerHTML = '<span style="color: #666;">Thinking...</span>';
            responseBox.classList.remove('error');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question, wteName: 'Hello World App' })
                });

                const data = await res.json();

                if (!res.ok || data.error) {
                    throw new Error(data.error || 'Server error ' + res.status);
                }

                // Success
                responseBox.innerHTML = '<strong>Gemini says:</strong><br/>' + data.answer.replace(/\n/g, '<br/>');
            } catch (err) {
                // Error mapping
                responseBox.classList.add('error');
                responseBox.innerHTML = '<strong>Error:</strong><br/>' + err.message;
            } finally {
                // Rest state
                btn.disabled = false;
                btn.textContent = 'Ask Gemini';
            }
        }
    </script>
</body>
</html>
